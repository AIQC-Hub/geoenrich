[package]
name = "geoenrich"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Enrich longitude/latitude points with coast distance, bathymetric depth, sea name, and nearest country/municipality"
readme = "README.md"
keywords = ["geospatial", "gis", "oceanography", "parquet", "cli"]
categories = ["command-line-utilities", "science"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
rayon = "1"
flate2 = "1"
polars = { version = "0.43", features = ["lazy", "parquet", "csv"] }

# GEBCO bathymetry grid (depth module); links the system HDF5 / NetCDF C
# libraries, same system dependency as ctddump.
netcdf = "0.12"

# Vector geometry for the coast module: GSHHG shoreline shapefiles indexed in an
# R-tree of boundary segments. Point-to-segment distance is hand-rolled against
# the pure-Rust LAEA projection, so `geo` is not needed yet.
rstar = "0.13"
shapefile = "0.9"

# Remaining spatial dependencies are added per module as each algorithm is
# implemented, so the build stays light. Planned additions (see CLAUDE.md):
#   geojson  IHO Sea Areas (Marine Regions GeoJSON), sea module
#   shapefile is already present; place will reuse rstar + shapefile

[dev-dependencies]
tempfile = "3"
