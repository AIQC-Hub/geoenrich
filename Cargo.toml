[package]
name = "geoenrich"
version = "0.1.0"
edition = "2021"
license = "MIT"
description = "Enrich longitude/latitude points with coast distance, bathymetric depth, sea name, and nearest country/municipality"
readme = "README.md"
keywords = ["geospatial", "gis", "oceanography", "parquet", "cli"]
categories = ["command-line-utilities", "science"]

[dependencies]
clap = { version = "4", features = ["derive"] }
serde = { version = "1", features = ["derive"] }
toml = "0.8"
rayon = "1"
flate2 = "1"
polars = { version = "0.43", features = ["lazy", "parquet", "csv"] }

# Spatial dependencies are added per module as each algorithm is implemented, so
# the scaffold build stays light. Planned additions (see CLAUDE.md):
#   geo, geo-types, rstar   vector geometry + R-tree spatial index (coast, sea, place)
#   shapefile               GSHHG / Natural Earth / GISCO shapefiles
#   geojson                 IHO Sea Areas (Marine Regions GeoJSON)
#   netcdf                  GEBCO bathymetry grid (depth); links HDF5 like ctddump

[dev-dependencies]
tempfile = "3"
