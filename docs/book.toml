[book]
title = "geoenrich"
description = "Enrich longitude/latitude points with coast distance, bathymetric depth, sea name, and nearest country/municipality."
authors = ["AIQC-Hub"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/AIQC-Hub/geoenrich"
edit-url-template = "https://github.com/AIQC-Hub/geoenrich/edit/main/docs/{path}"
site-url = "/geoenrich/"

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
