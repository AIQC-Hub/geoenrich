name: Publish

# Publishes to crates.io when a version tag is pushed, the last step of the
# release procedure. Authentication uses crates.io Trusted Publishing (OIDC), so
# no long-lived API token is stored in this repository.
#
# Publishing is irreversible: a version can be yanked but never replaced. The
# job therefore refuses to run unless the tag and Cargo.toml agree, and the full
# test suite passes first.
on:
  push:
    tags: ["v*"]
  # Manual runs default to a dry run, so the workflow can be exercised safely.
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Package and verify without uploading"
        type: boolean
        default: true

permissions:
  contents: read

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The tag points at a commit CI has usually already tested, but a tag push does
  # not prove that, so the suite runs again here rather than assuming.
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C debuginfo=0"
    steps:
      - uses: actions/checkout@v7

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL \
                      /usr/local/share/boost /usr/share/swift
          sudo docker image prune --all --force || true
          df -h /

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # No reference data to fetch: the geometry tests build their features in
      # memory and the depth test builds a small synthetic NetCDF grid.
      - name: Run tests
        run: cargo test

      - name: Reclaim disk before the cache is saved
        if: always()
        run: |
          rm -rf target/debug/incremental
          df -h /

  publish:
    name: Publish to crates.io
    needs: test
    runs-on: ubuntu-latest
    # Trusted Publishing mints its token from this job's OIDC identity.
    permissions:
      id-token: write
      contents: read
    # Add required reviewers to this environment in the repository settings for a
    # human approval gate in front of the upload. Must match the environment
    # configured on the crates.io trusted publisher, if one is set there.
    environment: crates-io
    steps:
      - uses: actions/checkout@v7

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/local/lib/android /usr/share/dotnet /opt/ghc \
                      /usr/local/.ghcup /opt/hostedtoolcache/CodeQL
          df -h /

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev libnetcdf-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      # A tag that disagrees with Cargo.toml would publish a version nobody can
      # trace back to a commit, and it could never be corrected in place.
      - name: Check the tag matches Cargo.toml
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          manifest=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          tag="${GITHUB_REF_NAME#v}"
          echo "Cargo.toml: $manifest / tag: $tag"
          if [ "$manifest" != "$tag" ]; then
            echo "::error::Tag v$tag does not match Cargo.toml version $manifest"
            exit 1
          fi

      # Builds the exact tarball that would be uploaded and compiles it in
      # isolation. Runs unconditionally, so a manual dry run stops here.
      - name: Package and verify
        run: cargo publish --dry-run --locked

      - name: Authenticate to crates.io
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish
        if: ${{ github.event_name == 'push' || !inputs.dry_run }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked

  # Prebuilt binaries for users without a Rust toolchain. `static-netcdf` vendors
  # HDF5 and netCDF into the executable, so the archive needs no system libraries
  # at all. The helper scripts ship alongside, since the enrichment pipeline is
  # part of the product and would otherwise be reachable only by cloning.
  binaries:
    name: Build ${{ matrix.target }}
    needs: test
    runs-on: ${{ matrix.os }}
    strategy:
      # One platform failing should not deny the others their archive.
      fail-fast: false
      matrix:
        include:
          # Oldest practical runner, because a glibc-linked binary runs on that
          # release and newer, never older.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
          # macOS runner labels are retired fairly aggressively: macos-13 was
          # removed outright (its jobs queue forever rather than failing) and
          # macos-14 is deprecated. Check the label against
          # https://github.com/actions/runner-images before assuming a queued
          # macOS job is a slow one.
          - os: macos-15-intel
            target: x86_64-apple-darwin
          - os: macos-15
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v7

      - uses: dtolnay/rust-toolchain@stable

      # Native build per runner, so no cross toolchain is involved. Vendoring the
      # C libraries needs cmake, which every runner image already provides.
      - name: Build
        run: cargo build --release --locked --features static-netcdf

      - name: Stage the archive
        shell: bash
        run: |
          name="geoenrich-${GITHUB_REF_NAME}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp target/release/geoenrich "dist/$name/"
          strip "dist/$name/geoenrich" || echo "strip unavailable, shipping unstripped"
          cp -R scripts "dist/$name/"
          cp README.md LICENSE CHANGELOG.md "dist/$name/"
          tar -C dist -czf "$name.tar.gz" "$name"
          ls -lh "$name.tar.gz"

      - uses: actions/upload-artifact@v7
        with:
          name: geoenrich-${{ matrix.target }}
          path: geoenrich-*.tar.gz
          if-no-files-found: error

  # Attaches the archives to the GitHub Release. Tag runs only: a manual dispatch
  # builds and keeps the artifacts, but must not publish a release. Notes come
  # from the matching CHANGELOG section, falling back to generated notes.
  release:
    name: GitHub Release
    needs: binaries
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: Checksums
        run: |
          cd dist
          sha256sum geoenrich-*.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Extract the CHANGELOG section for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v v="$version" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p {print}
          ' CHANGELOG.md > notes.md
          if [ -s notes.md ]; then cat notes.md; else echo "no CHANGELOG entry for $version"; fi

      - name: Create the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s notes.md ]; then
            notes=(--notes-file notes.md)
          else
            notes=(--generate-notes)
          fi
          gh release create "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --title "geoenrich ${GITHUB_REF_NAME#v}" \
            "${notes[@]}" \
            dist/geoenrich-*.tar.gz dist/SHA256SUMS
